<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume</title>
<style>
  /* ATS-safe self-hosted font stack — Inter via system fallback if woff2 not present */
  @font-face {
    font-family: 'Inter';
    src: local('Inter'), local('Inter-Regular');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Inter';
    src: local('Inter Bold'), local('Inter-Bold');
    font-weight: 700;
  }

  @page {
    size: Letter;
    margin: 0.6in 0.65in;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.5pt;
    line-height: 1.45;
    color: #1a1a1a;
    max-height: 10.5in;
    overflow: hidden;
  }

  /* ATS keyword injection — visually hidden, parsed by text extractors */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
    font-size: 1px;
    color: white;
  }

  h1 {
    font-size: 18pt;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #111;
    margin-bottom: 2pt;
  }

  .contact-line {
    font-size: 9.5pt;
    color: #444;
    margin-bottom: 10pt;
  }

  .contact-line a {
    color: #444;
    text-decoration: none;
  }

  h2 {
    font-size: 10.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #111;
    border-bottom: 1px solid #ccc;
    padding-bottom: 1pt;
    margin-top: 9pt;
    margin-bottom: 5pt;
  }

  h3 {
    font-size: 10.5pt;
    font-weight: 700;
    color: #111;
    display: inline;
  }

  p {
    margin-bottom: 4pt;
    color: #222;
  }

  ul {
    padding-left: 14pt;
    margin-bottom: 4pt;
  }

  li {
    margin-bottom: 2pt;
    color: #222;
  }

  strong {
    font-weight: 700;
    color: #111;
  }

  em {
    font-style: italic;
    color: #444;
  }
</style>
</head>
<body>
{{ content }}
</body>
</html>
